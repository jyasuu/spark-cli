# sync-init.yaml
# Loaded by the iceberg-init container to seed Iceberg with example data.
# Two modes are provided — uncomment the one you want:
#   A) Sync from the existing postgres tables (products / orders / order_items)
#   B) Sync generated data (10 000 synthetic users) from a SQL query

sources:
  pg:
    type: postgres
    dsn: "host=postgres port=5432 dbname=shop user=app password=secret sslmode=disable"

destinations:
  warehouse:
    catalog_uri: "http://rest:8181"
    s3_endpoint: "http://minio:9000"
    region: "us-east-1"
    access_key_id: admin
    secret_access_key: password

# ── Option A: sync real tables from postgres/init.sql ─────────────────────────
sync_jobs:
  - name: products
    source: pg
    destination: warehouse
    namespace: demo
    table: products
    sql: |
      SELECT id, sku, name, category, unit_price, stock_qty, updated_at
      FROM products
      ORDER BY id
    watermark_column: ~
    batch_size: 1000
    mode: full

  - name: orders
    source: pg
    destination: warehouse
    namespace: demo
    table: orders
    sql: |
      SELECT id, user_id, status, total_amount, created_at, updated_at
      FROM orders
      ORDER BY id
    watermark_column: ~
    batch_size: 1000
    mode: full

  - name: order_items
    source: pg
    destination: warehouse
    namespace: demo
    table: order_items
    sql: |
      SELECT id, order_id, product_id, quantity, unit_price, line_total
      FROM order_items
      ORDER BY id
    watermark_column: ~
    batch_size: 1000
    mode: full
  # ── Option B: generated data (10 000 synthetic users) ─────────────────────────
  # Uncomment below (and comment Option A above) to use generated data instead.
  #
  - name: users_generated
    source: pg
    destination: warehouse
    namespace: demo
    table: users_generated
    sql: |
      SELECT
        'user_' || seq                                    AS username,
        floor(random() * (60 - 18 + 1) + 18)::int        AS age,
        now() - (random() * (interval '365 days'))        AS registered_at
      FROM generate_series(1, 10000) AS seq
    watermark_column: ~
    batch_size: 2000
    mode: full